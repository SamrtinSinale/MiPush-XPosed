name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 版本号 留空自动获取
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=,OU=,O=,L=,ST=,C="

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Get version
        id: version
        run: |
          VER="${{ github.event.inputs.version }}"
          if [ -n "$VER" ]; then
            echo "name=$VER" >> $GITHUB_OUTPUT
            echo "tag=$VER" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            DESCRIBE="$(git describe --tags --exclude 'v*-*' 2>/dev/null || echo '0.0.0')"
            echo "name=$DESCRIBE" >> $GITHUB_OUTPUT
            echo "tag=$DESCRIBE" >> $GITHUB_OUTPUT
          fi

      - name: Build and Sign APK
        run: |
          cat > local.properties << EOF
STORE_FILE_PATH=${PWD}/release.keystore
STORE_PASSWORD=android
KEY_ALIAS=release
KEY_PASSWORD=android
EOF
          ./gradlew :app:assembleRelease -PversionName=${{ steps.version.outputs.name }}

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.name }}
          tag_name: ${{ steps.version.outputs.tag }}
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          make_latest: true
