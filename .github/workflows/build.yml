name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g., 0.4.1)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-target: 34

      - name: Set version name
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "versionName=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          elif [ -n "${{ github.ref_name }}" ]; then
            echo "versionName=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "versionName=$(date +%Y%m%d)" >> $GITHUB_ENV
          fi

      - name: Build APK
        run: |
          ./gradlew :app:assembleRelease \
            -PversionName=${{ env.versionName }}

      - name: Sign APK
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiPush-XPosed-${{ env.versionName }}
          path: ${{ steps.sign.outputs.signedReleaseFile }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sign.outputs.signedReleaseFile }}
          generate_release_notes: true
